<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FN Logistic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    
    {% block content %}
    <div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-100 rounded-full opacity-50"></div>
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-orange-100 rounded-full opacity-50"></div>

        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 z-10">
            <div>
                <div class="mx-auto h-16 w-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
                    <i class="fa-solid fa-warehouse text-white text-3xl"></i>
                </div>
                <h2 class="mt-6 text-center text-3xl font-black text-slate-800 tracking-tight">Warehouse Portal</h2>
                <p class="mt-2 text-center text-sm text-slate-500 font-medium">
                    Manage your operations & workforce efficiently.
                </p>
            </div>

            <form class="mt-8 space-y-5" method="POST">
                {% csrf_token %}
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Phone Number / Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-user-check"></i>
                            </span>
                            <input name="username" type="text" required 
                                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition sm:text-sm" 
                                placeholder="Enter your ID">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Secure Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            
                            <input name="password" id="passwordInput" type="password" required 
                                class="block w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition sm:text-sm" 
                                placeholder="••••••••">
                            
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-blue-600 focus:outline-none">
                                <i id="eyeIcon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <script>
                    function togglePassword() {
                        const passwordInput = document.getElementById('passwordInput');
                        const eyeIcon = document.getElementById('eyeIcon');
                        
                        if (passwordInput.type === 'password') {
                            passwordInput.type = 'text';
                            eyeIcon.classList.remove('fa-eye');
                            eyeIcon.classList.add('fa-eye-slash');
                        } else {
                            passwordInput.type = 'password';
                            eyeIcon.classList.remove('fa-eye-slash');
                            eyeIcon.classList.add('fa-eye');
                        }
                    }
                </script>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded-md">
                        <label class="ml-2 block text-xs font-bold text-slate-600">Keep me logged in</label>
                    </div>
                    <div class="text-xs">
                        <a href="#" class="font-bold text-blue-600 hover:text-blue-500">Forgot access?</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-black rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-lg shadow-blue-200 transition-all active:scale-95">
                        START SESSION
                    </button>
                </div>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="px-2 bg-white text-slate-400 font-bold">New to Hub?</span></div>
            </div>

            <div class="text-center">
                <a href="{% url 'signup' %}" class="inline-flex items-center gap-2 text-sm font-black text-slate-700 hover:text-blue-600 transition">
                    Create an Account <i class="fa-solid fa-arrow-right-long"></i>
                </a>
            </div>
        </div>
    </div>
    {% endblock %}

</body>
</html>
