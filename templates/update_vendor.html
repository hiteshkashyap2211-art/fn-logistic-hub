{% extends 'base.html' %}

{% block content %}
{% with is_onboarding=True %}

<style>
    body { 
        font-family: 'Poppins', sans-serif; 
        overflow-x: hidden; 
        margin: 0 !important; 
        padding: 0 !important; 
    }
    .bg-logistics-hub { 
        background-color: #020617; 
        position: absolute; /* Changed from relative */
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100vh; 
    }
    .brand-font {
        font-family: 'Urbanist', sans-serif !important;
        font-weight: 900 !important;
        font-style: italic !important;
        letter-spacing: -0.05em;
        text-transform: uppercase;
    }
    .bg-logistics-hub { background-color: #020617; position: relative; min-height: 100vh; }
    .bg-slideshow { position: absolute; inset: 0; z-index: 0; overflow: hidden; background: #020617; }
    .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 2s ease-in-out; background-size: cover; background-position: center; }
    .slide.active { opacity: 0.45; }
    .glass-onboarding { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6); }
    .step { display: none; }
    .step.active { display: block; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    #multiStepForm input, #multiStepForm textarea, #multiStepForm select {
        background: #f1f5f9 !important; border: 2px solid #e2e8f0 !important; color: #0f172a !important;
        width: 100% !important; height: 58px !important; padding: 0 20px !important; border-radius: 12px !important;
        margin-top: 8px !important; font-size: 14px !important; font-weight: 600 !important; transition: all 0.3s ease !important;
    }
    #multiStepForm input:focus, #multiStepForm textarea:focus { border-color: #f97316 !important; background: white !important; outline: none !important; }
    label { color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-left: 4px; }
    textarea { height: 120px !important; padding-top: 15px !important; resize: none; }
</style>

<div class="w-full flex items-center justify-center bg-logistics-hub py-16 min-h-screen">
    <div class="bg-slideshow" id="slideshow-container">
        <div class="absolute inset-0 bg-gradient-to-b from-slate-950/80 via-transparent to-slate-950/90 z-10"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-lg px-6">
        <div class="glass-onboarding rounded-[3.5rem] p-10 md:p-12">
            <div class="text-center mb-10">
                <div class="inline-flex h-20 w-20 bg-gradient-to-br from-orange-500 to-orange-700 rounded-3xl items-center justify-center shadow-2xl shadow-orange-500/40 mb-6 transform -rotate-3 transition-transform hover:rotate-0 duration-300">
                    <i class="fa-solid fa-handshake-angle text-white text-4xl"></i>
                </div>
                
                <h1 class="text-3xl brand-font text-slate-950 leading-none">
                    VENDORS <span class="text-orange-600">HUB</span>
                </h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-3">Elite Business Onboarding</p>
            </div>

            <div class="flex justify-between mb-12 px-4 gap-3">
                <div id="dot1" class="h-2 w-full bg-orange-600 rounded-full"></div>
                <div id="dot2" class="h-2 w-full bg-slate-200 rounded-full"></div>
                <div id="dot3" class="h-2 w-full bg-slate-200 rounded-full"></div>
                <div id="dot4" class="h-2 w-full bg-slate-200 rounded-full"></div>
            </div>

            <form id="multiStepForm" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="step active" id="step1">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center"><i class="fa-solid fa-id-card text-orange-600 text-lg"></i></div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Business Identity</h2>
                    </div>
                    <div class="space-y-5">
                        <div class="flex flex-col"><label>Company Name</label><input type="text" name="company_name" value="{{ company.company_name }}" placeholder="e.g. Farukhnagar Logistics" required></div>
                        <div class="flex flex-col"><label>Business Email</label><input type="email" name="email" value="{{ request.user.email }}" placeholder="business@gmail.com" required></div>
                        <div class="flex flex-col"><label>Contact Person</label><input type="text" name="contact_person" value="{{ company.contact_person }}" placeholder="Full Name" required></div>
                    </div>
                    <button type="button" onclick="nextStep(2)" class="w-full bg-[#0f172a] text-white font-bold py-5 rounded-2xl mt-10 shadow-xl uppercase tracking-widest text-sm">Continue <i class="fa-solid fa-arrow-right-long"></i></button>
                </div>

                <div class="step" id="step2">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center"><i class="fa-solid fa-medal text-orange-600 text-lg"></i></div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Company Branding</h2>
                    </div>
                    <div class="flex flex-col items-center py-8">
                        <div class="relative group">
                            <div class="w-48 h-48 rounded-[3rem] overflow-hidden border-[6px] border-white bg-slate-100 shadow-2xl flex items-center justify-center">
                                <img id="logoPreview" src="https://ui-avatars.com/api/?name=Company&background=f8fafc&color=f97316&size=200" class="w-full h-full object-cover">
                            </div>
                            <label for="company_logo" class="absolute -bottom-4 -right-4 bg-orange-600 p-5 rounded-2xl text-white cursor-pointer shadow-2xl scale-110 hover:bg-orange-700 transition-all"><i class="fa-solid fa-upload text-xl"></i></label>
                            <input type="file" name="company_logo" id="company_logo" class="hidden" accept="image/*">
                        </div>
                        <p class="mt-8 text-[11px] font-bold text-slate-400 uppercase tracking-widest text-center">Upload Company Logo</p>
                    </div>
                    <div class="flex gap-4 mt-6">
                        <button type="button" onclick="nextStep(1)" class="flex-1 bg-slate-100 text-slate-500 font-bold py-5 rounded-2xl uppercase tracking-widest text-xs">Back</button>
                        <button type="button" onclick="nextStep(3)" class="flex-[2] bg-[#0f172a] text-white font-bold py-5 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Next Step</button>
                    </div>
                </div>

                <div class="step" id="step3">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center"><i class="fa-solid fa-handshake text-orange-600 text-lg"></i></div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Hosted Companies</h2>
                    </div>
                    <div class="space-y-5">
                        <div class="flex flex-col">
                            <label>Client Portfolio</label>
                            <input type="text" name="hosted_companies" placeholder="e.g. Amazon, DHL, Flipkart, BlueDart" class="form-input">
                            <p class="text-[10px] text-slate-400 mt-2 italic">* Separate company names with commas</p>
                        </div>
                        <div class="flex flex-col">
                            <label>Service Area</label>
                            <select name="service_area">
                                <option value="farukhnagar">Farukhnagar Hub</option>
                                <option value="binola">Binola Hub</option>
                                <option value="bilaspur">Bilaspur Hub</option>
                                <option value="pataudi">Pataudi Area</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-4 mt-10">
                        <button type="button" onclick="nextStep(2)" class="flex-1 bg-slate-100 text-slate-500 font-bold py-5 rounded-2xl uppercase tracking-widest text-xs">Back</button>
                        <button type="button" onclick="nextStep(4)" class="flex-[2] bg-[#0f172a] text-white font-bold py-5 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Next Step</button>
                    </div>
                </div>

                <div class="step" id="step4">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center"><i class="fa-solid fa-location-dot text-orange-600 text-lg"></i></div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Headquarters</h2>
                    </div>
                    <div class="space-y-5">
                        <div class="flex flex-col"><label>Official Address</label><textarea name="address" placeholder="Full office address..." required>{{ company.address }}</textarea></div>
                    </div>
                    <div class="flex gap-4 mt-10">
                        <button type="button" onclick="nextStep(3)" class="flex-1 bg-slate-100 text-slate-500 font-bold py-5 rounded-2xl uppercase tracking-widest text-xs">Back</button>
                        <button type="submit" class="flex-[2] bg-orange-600 text-white font-bold py-5 rounded-2xl shadow-2xl uppercase tracking-widest text-sm hover:bg-orange-700 transition-all">Complete Setup</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const warehouseImages = [
        'https://images.pexels.com/photos/236705/pexels-photo-236705.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
        'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d',
        'https://images.unsplash.com/photo-1553413077-190dd305871c',
        'https://images.pexels.com/photos/4481258/pexels-photo-4481258.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'
    ];
    const container = document.getElementById('slideshow-container');
    warehouseImages.forEach((url, index) => {
        const slide = document.createElement('div');
        slide.className = `slide ${index === 0 ? 'active' : ''}`;
        slide.style.backgroundImage = `url('${url}')`;
        container.appendChild(slide);
    });

    let currentIdx = 0;
    const slides = document.querySelectorAll('.slide');
    function cycleBackground() {
        if(slides.length > 0) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % slides.length;
            slides[currentIdx].classList.add('active');
        }
    }
    setInterval(cycleBackground, 5000);

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        for(let i=1; i<=4; i++) {
            const dot = document.getElementById('dot' + i);
            if(dot) dot.style.backgroundColor = (i <= step) ? '#ea580c' : '#e2e8f0';
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    const logoInput = document.getElementById('company_logo');
    const preview = document.getElementById('logoPreview');
    if(logoInput) {
        logoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => preview.setAttribute('src', e.target.result);
                reader.readAsDataURL(file);
            }
        });
    }
</script>

{% endwith %}
{% endblock %}
