{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Company Profile | FN Hub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <div class="flex items-center gap-3 mb-6 pb-4 border-b">
            <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600">
                <i class="fa-solid fa-building-shield text-lg"></i>
            </div>
            <div>
                <h2 class="text-xl font-black text-slate-800 uppercase italic">Edit Vendor Profile</h2>
                <p class="text-xs text-gray-500 font-medium">Update your logistics company details for workers to see.</p>
            </div>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Company Logo / Brand Banner</label>
                <input type="file" name="company_logo" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Company / Hub Name</label>
                <input type="text" name="company_name" value="{{ vendor_profile.company_name|default:'' }}" required class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-orange-500" placeholder="e.g. Flipkart Logistics Hub, Farukhnagar">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Operating Location</label>
                <input type="text" name="location" value="{{ vendor_profile.location|default:'' }}" required class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-orange-500" placeholder="e.g. Sector 3, Near KMP Expressway">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">About the Company & Work Environment</label>
                <textarea name="description" rows="4" class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-orange-500 resize-none" placeholder="Describe what your company does and delivery/loading shifts policy...">{{ vendor_profile.description|default:'' }}</textarea>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-black py-3 rounded-xl text-sm uppercase tracking-wider shadow-md transition-all">Save Changes</button>
                <a href="{% url 'vendor_dashboard' %}" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm font-bold transition text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
