<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | FN Logistic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        
        /* Fixed Background Slideshow Styles */
        #slideshow-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; background: #020617; 
        }
        .bg-slide { 
            position: absolute; inset: 0; background-size: cover; background-position: center; 
            transition: opacity 1.5s ease-in-out; z-index: 0; 
        }
        .overlay { position: absolute; inset: 0; z-index: 1; background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(249, 115, 22, 0.2)); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="slideshow-container">
        <div class="overlay"></div>
    </div>

    <div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden py-12 linkedin-font">
        
        <div class="relative z-10 w-full max-w-lg px-6">
            <div class="bg-white p-10 rounded-xl shadow-2xl border border-white/20 transition-all duration-500 hover:shadow-orange-500/10">
                
                <div class="text-center mb-8">
                    <div class="inline-flex h-16 w-16 bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl items-center justify-center shadow-xl shadow-orange-500/30 mb-4 transform hover:rotate-6 transition-transform duration-300">
                        <i class="fa-solid fa-bolt-lightning text-white text-3xl"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 tracking-tight">FN LOGISTICS <span class="text-orange-600">HUB</span></h1>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mt-1">Farukhnagar Operations</p>
                </div>

                <form action="{% url 'signup' %}" method="POST" class="space-y-6">
                    {% csrf_token %} 
                    
                    <div class="flex p-1 bg-slate-100 rounded-lg border border-slate-200">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="worker" checked class="peer hidden">
                            <div class="py-2.5 text-center rounded-md transition-all peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-orange-600 text-slate-500 font-bold text-xs uppercase tracking-wider">Field Worker</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="vendor" class="peer hidden">
                            <div class="py-2.5 text-center rounded-md transition-all peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-orange-600 text-slate-500 font-bold text-xs uppercase tracking-wider">Vendor</div>
                        </label>
                    </div>

                    <div class="space-y-4">
                        <input name="full_name" type="text" required class="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-md text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Full Name">
                        <input name="phone_number" type="tel" required class="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-md text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Mobile Number">
                        <div class="relative">
                            <input name="password" id="passInput" type="password" required class="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-md text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Create Password">
                            <button type="button" onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600">
                                <i id="eye" class="fa-solid fa-eye-slash text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-[#004182] hover:bg-[#003161] text-white py-3.5 rounded-full font-bold text-[18px] transition-all duration-300 active:scale-[0.98] shadow-lg">
                        Start Your Journey
                    </button>
                </form>

                <div class="mt-8 text-center pt-6 border-t border-slate-100">
                    <p class="text-sm font-medium text-slate-500">Already part of the hub? <a href="{% url 'login' %}" class="text-[#004182] font-bold hover:underline ml-1">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('passInput');
            const eye = document.getElementById('eye');
            input.type = input.type === 'password' ? 'text' : 'password';
            eye.className = input.type === 'password' ? 'fa-solid fa-eye-slash text-sm' : 'fa-solid fa-eye text-sm';
        }

        const warehouseImages = [
            'https://images.unsplash.com/photo-1553413077-190dd305871c?q=100&w=2400',
            'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=100&w=2400',
            // 'https://images.unsplash.com/photo-1566586610453-08709e99a803?q=100&w=2400',
            'https://images.unsplash.com/photo-1578575437130-527eed3abbec?q=100&w=2400'
        ];

        const container = document.getElementById('slideshow-container');
        let currentIndex = 0;

        function changeBackground() {
            const oldImage = container.querySelector('.bg-slide');
            const newImage = document.createElement('div');
            newImage.className = "bg-slide opacity-0";
            newImage.style.backgroundImage = `url('${warehouseImages[currentIndex]}')`;
            
            // Overlay ke neeche insert karo
            container.insertBefore(newImage, container.querySelector('.overlay'));
            
            setTimeout(() => { newImage.style.opacity = '0.6'; }, 50);
            
            if (oldImage) {
                oldImage.style.opacity = '0';
                setTimeout(() => { oldImage.remove(); }, 1500);
            }
            currentIndex = (currentIndex + 1) % warehouseImages.length;
        }

        setInterval(changeBackground, 5000);
        changeBackground();
    </script>
</body>
</html>
